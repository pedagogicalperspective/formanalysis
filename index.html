function mdToHtml(text){
  if(!text)return"";
  const lines=text.split("\n");let html="",inList=false;
  const esc=s=>s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>");
  for(const line of lines){
    const t=line.trim();
    if(!t){if(inList){html+="</ul>";inList=false;}continue;}
    if(/^## (.+)$/.test(t)){if(inList){html+="</ul>";inList=false;}html+="<h2>"+esc(t.slice(3))+"</h2>";}
    else if(/^### (.+)$/.test(t)){if(inList){html+="</ul>";inList=false;}html+="<h3>"+esc(t.slice(4))+"</h3>";}
    else if(/^- (.+)$/.test(t)){if(!inList){html+="<ul>";inList=true;}html+="<li>"+esc(t.slice(2))+"</li>";}
    else{if(inList){html+="</ul>";inList=false;}html+="<p>"+esc(t)+"</p>";}
  }
  if(inList)html+="</ul>";
  return html;
}

function readFile(file){
  return new Promise((resolve,reject)=>{
    const ext=file.name.split(".").pop().toLowerCase();
    if(["xlsx","xls","csv"].includes(ext)){
      const r=new FileReader();
      r.onload=e=>{try{
        const wb=XLSX.read(e.target.result,{type:"binary"});
        let t="DOSYA: "+file.name+"\n\n";
        wb.SheetNames.forEach(s=>{const ws=wb.Sheets[s];const d=XLSX.utils.sheet_to_json(ws,{header:1});t+="=== "+s+" ===\n";d.forEach(row=>{if(row.some(c=>c!=null&&c!==""))t+=row.join(" | ")+"\n";});t+="\n";});
        resolve(t);
      }catch(e){reject(e);}};
      r.onerror=reject;r.readAsBinaryString(file);
    }else if(ext==="pdf"){
      const r=new FileReader();
      r.onload=e=>resolve({type:"pdf",base64:e.target.result.split(",")[1]});
      r.onerror=reject;r.readAsDataURL(file);
    }else if(["txt","md"].includes(ext)){
      const r=new FileReader();
      r.onload=e=>resolve(e.target.result);
      r.onerror=reject;r.readAsText(file,"UTF-8");
    }else reject(new Error("Desteklenmeyen dosya türü."));
  });
}

async function analyzeForm(){
  if(!state.fileContent||!state.mode)return;
  const MSGS=["Form verileri işleniyor...","Ölçek 1 analiz ediliyor...","Ölçek 2 değerlendiriliyor...","Materyal süreci inceleniyor...","Pedagojik tasarım analiz ediliyor...","Kazanım uyumu kontrol ediliyor...","Prompt kalitesi değerlendiriliyor...","Rapor yapılandırılıyor..."];
  let idx=0;
  setState({step:"analyzing",error:null,report:null,loadingMsg:MSGS[0]});
  const iv=setInterval(()=>{idx=(idx+1)%MSGS.length;const el=document.getElementById("loadingMsg");if(el)el.textContent=MSGS[idx];},2500);
  const labels={weekly:"tek haftaya ait yansıtma formu ve ölçek verileri",individual:"10 haftalık tüm yansıtma formu ve ölçek verileri",class:"tüm öğretmen adaylarının 10 haftalık yansıtma formu ve ölçek verileri"};
  const prompt="Bu dosya, sosyal bilgiler öğretmen adaylarının "+labels[state.mode]+" içermektedir. Sistem talimatlarındaki 7 boyutlu değerlendirme çerçevesine göre kapsamlı bir rapor hazırla.";
  try{
    let messages;
    if(typeof state.fileContent==="object"&&state.fileContent.type==="pdf"){
      messages=[{role:"user",content:[{type:"document",source:{type:"base64",media_type:"application/pdf",data:state.fileContent.base64}},{type:"text",text:prompt}]}];
    }else{
      messages=[{role:"user",content:prompt+"\n\n---\n"+state.fileContent+"\n---"}];
    }
    const apiKey=localStorage.getItem("anthropic_api_key")||"";
    if(!apiKey){setState({error:"Lütfen önce API anahtarınızı girin.",step:"ready"});clearInterval(iv);return;}
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        "x-api-key":apiKey,
        "anthropic-version":"2023-06-01",
        "anthropic-dangerous-direct-browser-access":"true"
      },
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:PROMPTS[state.mode],messages})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const text=(data.content||[]).map(b=>b.text||"").join("\n");
    setState({report:text,step:"done"});
  }catch(e){setState({error:"Analiz hatası: "+e.message,step:"ready"});}
  finally{clearInterval(iv);}
}

function el(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class")e.className=v;
    else if(k==="style")Object.assign(e.style,v);
    else if(k.startsWith("on"))e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  });
  children.forEach(c=>{if(c==null)return;if(typeof c==="string")e.appendChild(document.createTextNode(c));else if(c instanceof Node)e.appendChild(c);});
  return e;
}
function div(a,...c){return el("div",a,...c);}
function span(a,...c){return el("span",a,...c);}
function btn(a,...c){return el("button",a,...c);}

function renderStepBar(){
  const order=["mode","upload","ready","analyzing","done"];
  const cur=order.indexOf(state.step==="ready"?"upload":state.step);
  const stepIds=["mode","upload","analyzing","done"];
  const bar=div({class:"stepbar"});
  stepIds.forEach((sid,i)=>{
    const me=order.indexOf(sid);
    const active=(sid==="upload"&&(state.step==="upload"||state.step==="ready"))||state.step===sid;
    const done=me<cur;
    const s=STEPS.find(x=>x.id===sid);
    const item=div({class:"step-item"+(active?" active":"")+(done?" done":"")});
    item.appendChild(div({class:"step-num"},done?"✓":String(i+1).padStart(2,"0")));
    item.appendChild(span({class:"step-label"},s.label));
    bar.appendChild(item);
    if(i<stepIds.length-1)bar.appendChild(div({class:"step-connector"+(done?" done":"")}));
  });
  return bar;
}

}

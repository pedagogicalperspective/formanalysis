<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SB Dönüt Raporu</title>
<style>
/* ── EKRAN STILI ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0a0f1e;color:#e2e8f0;padding:24px;}
.wrap{max-width:720px;margin:0 auto;}
h1{font-size:22px;color:#93c5fd;margin-bottom:4px;}
.sub{font-size:11px;color:#334155;margin-bottom:20px;}
.box{background:#111827;border:1px solid #1e3a5f;border-radius:10px;padding:16px;margin-bottom:12px;}
.box h3{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#475569;margin-bottom:10px;}
label.lbl{display:block;font-size:11px;color:#475569;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;}
input[type=password],input[type=text],select{display:block;width:100%;background:#0d1524;border:1px solid #1e3a5f;border-radius:7px;padding:9px 12px;color:#e2e8f0;font-size:13px;font-family:Arial,sans-serif;outline:none;appearance:none;-webkit-appearance:none;}
input[type=password]{font-family:monospace;}
input[type=password]:focus,input[type=text]:focus,select:focus{border-color:#1d4ed8;}
select option{background:#0d1524;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fld{display:flex;flex-direction:column;gap:4px;}
input[type=file]{display:block;width:100%;background:#0d1524;border:2px dashed #1e3a5f;border-radius:8px;padding:14px 12px;color:#64748b;font-size:13px;font-family:Arial,sans-serif;cursor:pointer;outline:none;}
input[type=file]:hover{border-color:#1d4ed8;color:#93c5fd;}
input[type=file]::file-selector-button{background:#1d4ed8;color:white;border:none;padding:7px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:700;margin-right:12px;font-family:Arial,sans-serif;}
#statusBox{padding:12px 14px;border-radius:8px;font-size:13px;line-height:1.7;background:#0d1524;border:1px solid #1e3a5f;min-height:44px;margin-top:10px;white-space:pre-wrap;}
#progBar{height:4px;background:#1e3a5f;border-radius:2px;overflow:hidden;margin-top:8px;}
#progFill{height:100%;background:#1d4ed8;transition:width .4s ease;width:0;}
.btn{display:block;width:100%;padding:14px;color:white;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;margin-top:8px;}
#runBtn{background:#1d4ed8;}
#runBtn:hover:not(:disabled){background:#1a44c0;}
#runBtn:disabled{opacity:.45;cursor:not-allowed;}
#dlBtn{background:#166534;display:none;}
#dlBtn:hover{background:#14532d;}
#resultBox{display:none;padding:14px 16px;border-radius:8px;background:#0d1f0d;border:1px solid #166534;margin-top:10px;}
.r-name{font-size:16px;font-weight:700;color:#f1f5f9;}
.r-meta{font-size:11px;color:#334155;margin-top:3px;}
.r-score{font-size:38px;font-weight:700;color:#86efac;}
.dims{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:10px;}
.dim{text-align:center;background:#111827;border-radius:8px;padding:10px 4px;}
.keySt{font-size:11px;margin-top:4px;}

/* ── PDF / YAZICI STILI ──────────────────────────────────── */
#pdfContent{display:none;}

@media print{
  body{background:white!important;padding:0!important;margin:0!important;color:#000!important;}
  .wrap{display:none!important;}
  #pdfContent{
    display:block!important;
    font-family:Arial,sans-serif;
    font-size:9pt;
    color:#1a1a1a;
    padding:0;
    margin:0;
  }
  @page{size:A4;margin:12mm 12mm 14mm 12mm;}

  /* Cover */
  .pdf-cover{background:#0A1E44!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:14mm 12mm 8mm;margin-bottom:0;}
  .pdf-cover-title{font-size:22pt;font-weight:700;color:#fff!important;margin-bottom:3mm;}
  .pdf-cover-sub{font-size:10pt;color:#93C5FD!important;margin-bottom:1mm;}
  .pdf-cover-sub2{font-size:9pt;color:#6B8FC4!important;}
  .pdf-name-bar{background:#1D4ED8!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:5mm 12mm;}
  .pdf-name-bar .name{font-size:14pt;font-weight:700;color:#fff!important;}
  .pdf-name-bar .meta{font-size:9pt;color:#DBEAFE!important;}
  .pdf-ders-bar{background:#0F2744!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:3mm 12mm;border-top:0.5pt solid #1D4ED8;}
  .pdf-ders-bar span{font-size:8.5pt;color:#93C5FD!important;}
  .pdf-ders-bar strong{color:#fff!important;}

  /* Meta table */
  .pdf-meta{width:100%;border-collapse:collapse;margin:4mm 0;}
  .pdf-meta td{padding:2mm 3mm;font-size:8pt;border:0.5pt solid #fff;}
  .pdf-meta .lbl{background:#0A1E44!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#fff!important;font-weight:700;width:32%;}
  .pdf-meta .val{background:#F1F5F9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#334155!important;}
  .pdf-meta .ok{background:#DCFCE7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pdf-meta .warn{background:#FEF3C7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  /* Summary */
  .pdf-summary{border-left:4pt solid #1D4ED8;border-top:1.5pt solid #1D4ED8;background:#F1F5F9!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:3mm 4mm;margin:3mm 0;font-size:8.5pt;line-height:1.5;}
  .pdf-summary h4{font-size:9pt;font-weight:700;color:#0A1E44!important;margin-bottom:2mm;}

  /* Score table */
  .pdf-section-title{font-size:11pt;font-weight:700;color:#0A1E44!important;margin:4mm 0 2mm;}
  .pdf-scores{width:100%;border-collapse:collapse;margin-bottom:0;}
  .pdf-scores th{background:#0A1E44!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#fff!important;font-size:8pt;padding:2mm 3mm;text-align:left;}
  .pdf-scores td{font-size:8.5pt;padding:2mm 3mm;border-bottom:0.5pt solid #E2E8F0;}
  .pdf-scores tr.total td{background:#0A1E44!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;color:#fff!important;font-weight:700;}
  .pdf-scores td.sc{font-weight:700;}

  /* Grade bar */
  .pdf-grade-bar{display:flex;margin:0 0 4mm;border:0.5pt solid #1E293B;}
  .pdf-grade-cell{flex:1;padding:2.5mm 1mm;text-align:center;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .pdf-grade-cell .gn{font-size:7.5pt;font-weight:700;color:#fff!important;}
  .pdf-grade-cell .gr{font-size:7pt;color:#93C5FD!important;margin-top:0.5mm;}
  .pdf-grade-cell .ga{font-size:7.5pt;font-weight:700;color:#FCD34D!important;margin-top:0.5mm;}

  /* Dim cards */
  .pdf-dim{border:1pt solid #E2E8F0;margin:3mm 0;break-inside:avoid;page-break-inside:avoid;}
  .pdf-dim-hdr{padding:2.5mm 3mm;-webkit-print-color-adjust:exact;print-color-adjust:exact;display:flex;justify-content:space-between;align-items:center;}
  .pdf-dim-hdr .dtitle{font-size:9pt;font-weight:700;color:#fff!important;}
  .pdf-dim-hdr .dscore{font-size:11pt;font-weight:700;color:#FCD34D!important;}
  .pdf-dim-status{font-size:8pt;font-weight:700;padding:1.5mm 3mm;background:#F8FAFC!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border-bottom:0.5pt solid #E2E8F0;}
  .pdf-dim-cols{display:grid;grid-template-columns:1fr 1fr;}
  .pdf-dim-good{background:#DCFCE7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:2mm 3mm;border-right:0.5pt solid #E2E8F0;}
  .pdf-dim-weak{background:#FEF3C7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:2mm 3mm;}
  .pdf-dim-good h5,.pdf-dim-weak h5{font-size:8pt;font-weight:700;margin-bottom:1.5mm;}
  .pdf-dim-good h5{color:#166534!important;}
  .pdf-dim-weak h5{color:#92400E!important;}
  .pdf-dim-good ul,.pdf-dim-weak ul{padding-left:3.5mm;font-size:7.5pt;}
  .pdf-dim-good ul li,.pdf-dim-weak ul li{margin-bottom:1mm;line-height:1.35;color:#334155!important;}
  .pdf-dim-rec{background:#DBEAFE!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:2mm 3mm;font-size:8pt;border-top:0.5pt solid #93C5FD;border-left:2pt solid #1D4ED8;}
  .pdf-dim-rec strong{color:#1D4ED8!important;}

  /* Steps */
  .pdf-steps{margin:3mm 0;}
  .pdf-step{margin-bottom:2mm;break-inside:avoid;page-break-inside:avoid;padding:2.5mm 3.5mm;}
  .pdf-step .snum{font-size:14pt;font-weight:700;display:inline;margin-right:2mm;}
  .pdf-step .stitle{font-size:9pt;font-weight:700;color:#0A1E44!important;display:inline;}
  .pdf-step .sdesc{font-size:8pt;color:#334155!important;margin-top:1.5mm;line-height:1.4;}
  .step0{background:#FEE2E2!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border-left:3pt solid #991B1B;}
  .step1{background:#FEF3C7!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border-left:3pt solid #92400E;}
  .step2{background:#DBEAFE!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;border-left:3pt solid #1D4ED8;}
  .step0 .snum{color:#991B1B!important;}
  .step1 .snum{color:#92400E!important;}
  .step2 .snum{color:#1D4ED8!important;}

  /* Footer */
  .pdf-footer{border-top:1pt solid #93C5FD;margin-top:4mm;padding-top:2mm;text-align:center;font-size:7.5pt;color:#64748B!important;font-style:italic;}

  .page-break{page-break-before:always;}
}
</style>
</head>
<body>
<div class="wrap">
<h1>SB Dönüt Raporu</h1>
<div class="sub">Doç. Dr. Erhan Yaylak · Bilişim Teknolojileri · Sosyal Bilgiler Öğretmenliği</div>

<div class="box">
  <h3>Anthropic API Anahtarı</h3>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
  <div class="keySt" id="keySt"></div>
</div>

<div class="box">
  <h3>Hafta &amp; Tema</h3>
  <div class="row2">
    <div class="fld"><label class="lbl">Hafta</label>
      <select id="weekSel"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7</option><option>8</option><option>9</option><option>10</option></select>
    </div>
    <div class="fld"><label class="lbl">Tema</label><input type="text" id="temaInp" placeholder="1. Tema"></div>
  </div>
</div>

<div class="box">
  <h3>Öğrenci Form PDF'i</h3>
  <input type="file" id="fileInp" accept=".pdf,application/pdf">
  <div id="statusBox">Dosya seçilmedi. PDF seçip Değerlendir butonuna basın.</div>
  <div id="progBar"><div id="progFill"></div></div>
</div>

<button class="btn" id="runBtn">🤖 &nbsp;Değerlendir</button>
<button class="btn" id="dlBtn" onclick="printPDF()">📄 &nbsp;PDF Olarak İndir</button>

<div id="resultBox">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
    <div><div class="r-name" id="rName"></div><div class="r-meta" id="rMeta"></div></div>
    <div style="text-align:right"><div class="r-score" id="rScore"></div><div id="rGrade" style="font-size:12px;font-weight:700;margin-top:2px"></div></div>
  </div>
  <div class="dims" id="rDims"></div>
</div>
</div>

<!-- PDF içeriği — sadece yazdırırken görünür -->
<div id="pdfContent"></div>

<script>
var pdfB64=null, currentRep=null;
var GRADES=[{label:'BAŞLANGIÇ',min:0,max:15,fill:'#475569',bg:'475569'},{label:'TEMEL',min:16,max:25,fill:'#1D4ED8',bg:'1D4ED8'},{label:'GELİŞMEKTE',min:26,max:35,fill:'#1E4D8C',bg:'1E4D8C'},{label:'İYİ',min:36,max:43,fill:'#166534',bg:'166534'},{label:'PEKİYİ',min:44,max:50,fill:'#14532D',bg:'14532D'}];
var DIMS=[{id:'b1',label:'YZ Araç',color:'#F59E0B'},{id:'b2',label:'Materyal',color:'#1D4ED8'},{id:'b3',label:'Pedagoji',color:'#F59E0B'},{id:'b4',label:'Kazanım',color:'#166534'},{id:'b5',label:'Prompt',color:'#5B21B6'}];
var DIMW=[{id:'b1',label:'YZ Araç Kullanımı',hc:'F59E0B'},{id:'b2',label:'Materyal & Doğrulama',hc:'1D4ED8'},{id:'b3',label:'Pedagojik Tasarım',hc:'F59E0B'},{id:'b4',label:'Kazanım & İçerik',hc:'166534'},{id:'b5',label:'Prompt Kalitesi',hc:'5B21B6'}];
var DHC=['#F59E0B','#1D4ED8','#F59E0B','#166534','#5B21B6'];
var STC=[{c:'#991B1B',bg:'FEE2E2'},{c:'#92400E',bg:'FEF3C7'},{c:'#1D4ED8',bg:'DBEAFE'}];

function getGrade(t){return GRADES.find(function(g){return t>=g.min&&t<=g.max;})||GRADES[0];}
function totSc(sc){return Object.values(sc||{}).reduce(function(a,b){return a+b;},0);}
function G(id){return document.getElementById(id);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setStatus(msg,color){var el=G('statusBox');el.textContent=msg;el.style.color=color||'#93c5fd';el.style.borderColor=color==='#86efac'?'#166534':color==='#fca5a5'?'#991b1b':'#1e3a5f';}
function setP(pct){G('progFill').style.width=pct+'%';}

function loadKey(){var k=localStorage.getItem('sb_key')||'';if(k.startsWith('sk-')){G('apiKey').value=k;G('keySt').textContent='✓ Kayıtlı key yüklendi';G('keySt').style.color='#86efac';}}
function getKey(){var v=G('apiKey').value.trim();if(v.startsWith('sk-')){localStorage.setItem('sb_key',v);}return v||localStorage.getItem('sb_key')||'';}

window.addEventListener('DOMContentLoaded',function(){
  loadKey();
  G('fileInp').addEventListener('change',function(){
    var file=this.files&&this.files[0];
    if(!file){setStatus('Dosya seçilmedi.');return;}
    setStatus('Yükleniyor: '+file.name+' ...');setP(0);
    var reader=new FileReader();
    reader.addEventListener('load',function(e){
      var res=e.target.result||'';
      var idx=res.indexOf(',');
      if(idx<0){setStatus('Dosya okunamadı.','#fca5a5');return;}
      var b64=res.substring(idx+1);
      if(!b64||b64.length<100){setStatus('İçerik boş.','#fca5a5');return;}
      pdfB64=b64;
      G('fileInp').value='';
      setStatus('Hazır: '+file.name+' ('+(file.size/1024).toFixed(1)+' KB) — Değerlendir butonuna basın.','#86efac');
    });
    reader.addEventListener('error',function(){setStatus('Okuma hatası.','#fca5a5');});
    reader.readAsDataURL(file);
  });
  G('runBtn').addEventListener('click',function(){runEval();});
});

async function runEval(){
  if(!pdfB64){setStatus('PDF seçilmedi!','#fca5a5');return;}
  var key=getKey();
  if(!key){setStatus('API Key yok! Üstteki alana sk-ant-api03-... anahtarı girin.','#fca5a5');return;}
  G('runBtn').disabled=true;G('dlBtn').style.display='none';G('resultBox').style.display='none';
  var week=G('weekSel').value, tema=G('temaInp').value||week+'. Tema';
  var prompt=
    'Bu PDF, Sosyal Bilgiler ogretmen adayinin '+week+'. hafta dijital ogrenme urunu hazirlama ve yansitma formudur.\n\n'+
    'TEMEL DEGERLENDIRME CERCEVESI:\n'+
    'Ogretmen adaylarindan yapay zeka araclarini ogretim sureclerine ETIK ve SORUMLU bir sekilde entegre etmeleri beklenmektedir.\n'+
    'Bu; YZ ciktisini korfue kabul etmemek, dogrulama yapmak, ozgunlugu korumak, gizlilik ve onyargiya dikkat etmek, pedagojik amaci on plana almak demektir.\n\n'+
    '5 BOYUT (her biri 0-10 puan):\n'+
    'B1 - YZ Aracinin Etik ve Etkin Kullanimi:\n'+
    '  * YZ bir arac mi, yoksa tum isleri yapan bir sistem mi? Adayin kendi katki ve dusuncesi ne kadar?\n'+
    '  * YZ katki orani (%26-50 ideal; %76-100 ozgunluk riski; %0 entegrasyon yok)\n'+
    '  * YZ hangi asama/larda kullanilmis? (planlama/icerik/soru/duzenleme)\n'+
    '  * Pedagojik amac acik mi? YZ kullanimi rastgele mi, bilinclice mi?\n\n'+
    'B2 - Materyal Gelistirme, Dogrulama ve Etik Sorumluluk:\n'+
    '  * YZ ciktisi dogrulandi mi? (MEB kitabi, resmi site, uzman, farkli kaynak)\n'+
    '  * Kaynak referanslari eksiksiz mi? (sayfa/URL/bolum belirtilmis mi?)\n'+
    '  * Gizlilik: ogrenci verisi/kisisel veri kullanildi mi? Telif kontrol edildi mi?\n'+
    '  * Onyargi/kapsayicilik: icerik ayrimci dil, stereotip, kulturel yanlilik iceriyor mu? Kontrol edildi mi?\n\n'+
    'B3 - Pedagojik Tasarim ve Ogretmen Adayi Yansimasi:\n'+
    '  * Pedagojik gerekcesi derinlikli mi? (Etiket duzeyinde "somutlastirir" vs. kazanima ozgu aciklama)\n'+
    '  * Materyal ogrenci merkezli mi, farklilasmaya uygun mu?\n'+
    '  * Aday, sureci yansitici bicimde degerlendirebiliyor mu? (oz gelisim somut ve gercekci mi?)\n'+
    '  * Ogretmenin rehber/tasarimci rolu gozukunuyor mu, yoksa YZ\'ye teslim mi olunmus?\n\n'+
    'B4 - SB Kazanim ve Icerik Uyumu:\n'+
    '  * Kazanim kodu (SB.X.X.X) ve tam ifadesi var mi?\n'+
    '  * Unite-konu-kazanim zinciri tutarli mi?\n'+
    '  * Urun linki paylasiliyor mu? Format kazanima uygun mu?\n\n'+
    'B5 - Prompt Muhendisligi Kalitesi:\n'+
    '  * Prompt paylassildi mi? (link veya metin)\n'+
    '  * Prompt pedagojik amaci, sinif duzeyini, icerik kapsamini, format kisitini iceriyor mu?\n'+
    '  * Prompt "etik YZ kullanimi" yansitıyor mu? (kazanim baglamli, seviyeye uygun, dogrulama niyetiyle mi yazilmis?)\n\n'+
    'YORUMLAMA ILKELERI:\n'+
    '- Guclu yonleri taniyin; gelisim alanlarini yapici ve ileri bakilsli ifade edin.\n'+
    '- YZ\'yi korfue kullanan ama dogrulamayan adaylar icin B2 dusuk puanlanir.\n'+
    '- %76-100 YZ katki orani otomatik dusuk B1 demek degildir; icerige katki ve ozgunluk da degerlendirilir.\n'+
    '- Etik boyut (gizlilik, telif, onyargi) mutlaka yoruma dahil edilmeli.\n'+
    '- Oner ici somut, uygulanabilir ve bir sonraki temaya tasinalacak nitelikte olsun.\n\n'+
    'SADECE JSON dokundur:\n'+
    '{"studentName":"AD SOYAD","sinif":"X. Sinif","ders":"Sosyal Bilgiler","tema":"'+tema+'","tarih":"tarih","unite":"unite","konu":"konu","kazanim":"SB.X.X.X - ifade","dijitalArac":"arac","yzArac":"YZ","icerikTuru":"tur","yzKatki":"%26-50","urunLink":"",'+
    '"scores":{"b1":6,"b2":7,"b3":5,"b4":8,"b5":3},'+
    '"genelOzet":"3-4 cumle: Adayin YZ entegrasyon olgunlugu, etik sorumluluk farkindaligi ve pedagojik tasarim kalitesi. En guclu ve en kritik gelisim alani belirtilmeli.",'+
    '"dims":{'+
    '"b1":{"status":"ORTA DUZEY — kisa aciklama (YZ etik/etkin mi?)","good":["guclu 1","guclu 2","guclu 3"],"weak":["gelisim 1","gelisim 2"],"rec":"Somut, pedagojik amacli, etik cerceveli oneri"},'+
    '"b2":{"status":"","good":[],"weak":[],"rec":""},'+
    '"b3":{"status":"","good":[],"weak":[],"rec":""},'+
    '"b4":{"status":"","good":[],"weak":[],"rec":""},'+
    '"b5":{"status":"","good":[],"weak":[],"rec":""}},'+
    '"steps":['+
    '{"title":"En kritik gelisim — etik/pedagojik odakli","desc":"Somut, olculebilir, bir sonraki hafta uygulanabilir oneri"},'+
    '{"title":"Ikinci oncelik","desc":"..."},'+
    '{"title":"Ucuncu oncelik","desc":"..."}]}';
  try{
    setStatus('Claude analiz ediyor...');setP(25);
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:4000,messages:[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:pdfB64}},{type:'text',text:prompt}]}]})
    });
    setStatus('Yanıt işleniyor...');setP(65);
    if(!resp.ok){var et=await resp.text();throw new Error('HTTP '+resp.status+': '+et.substring(0,200));}
    var data=await resp.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    var raw=data.content[0].text.replace(/```json/g,'').replace(/```/g,'').trim();
    var rep;
    try{rep=JSON.parse(raw);}
    catch(pe){var m=raw.match(/\{[\s\S]*\}/);if(m)rep=JSON.parse(m[0]);else throw new Error('JSON hatası: '+pe.message);}
    rep.hafta=parseInt(week);rep.tema=tema;
    currentRep=rep;
    try{var db=JSON.parse(localStorage.getItem('sb_eval')||'{}');if(!db[rep.studentName])db[rep.studentName]={};db[rep.studentName][week]=rep;localStorage.setItem('sb_eval',JSON.stringify(db));}catch(e){}
    setP(90);
    buildPdfHtml(rep);
    setP(100);
    var t=totSc(rep.scores),gr=getGrade(t);
    G('rName').textContent=rep.studentName||'?';
    G('rMeta').textContent=(rep.ders||'SB')+' · '+(rep.sinif||'')+' · H'+week+' · '+tema;
    G('rScore').textContent=t;
    G('rGrade').textContent=gr.label+' ('+t+'/50)';
    G('rGrade').style.color=gr.fill;
    G('rDims').innerHTML=DIMS.map(function(d){return '<div class="dim" style="border-top:3px solid '+d.color+'"><div style="font-size:8px;color:#475569;margin-bottom:5px">'+d.label+'</div><div style="font-size:20px;font-weight:700;color:'+d.color+'">'+(rep.scores[d.id]||0)+'</div><div style="font-size:9px;color:#334155">/10</div></div>';}).join('');
    G('resultBox').style.display='block';
    G('dlBtn').style.display='block';
    setStatus('Tamamlandı! '+rep.studentName+' · '+t+'/50 · '+gr.label+'\n"PDF Olarak İndir" butonuna basın.','#86efac');
  }catch(err){setStatus('HATA:\n'+err.message,'#fca5a5');setP(0);}
  finally{G('runBtn').disabled=false;}
}

function buildPdfHtml(r){
  var sc=r.scores||{b1:5,b2:5,b3:5,b4:5,b5:5};
  var t=totSc(sc), gr=getGrade(t);
  var katki=String(r.yzKatki||'—');
  var katkiCls=(katki==='%26-50'||katki==='%1-25')?'ok':(katki==='%76-100'?'warn':'');

  // Meta rows
  var metaRows=[
    ['Öğretmen Adayı',r.studentName,''],
    ['Ders',r.ders||'SB',''],
    ['Sınıf',r.sinif,''],
    ['Hafta / Tema','H'+r.hafta+' — '+esc(r.tema||''),''],
    ['Ünite',r.unite,''],
    ['Konu',r.konu,''],
    ['Kazanım',r.kazanim,'ok'],
    ['Dijital Araç',r.dijitalArac,''],
    ['YZ Aracı',r.yzArac,''],
    ['İçerik Türü',r.icerikTuru,''],
    ['YZ Katkı Oranı',katki,katkiCls]
  ];
  if(r.urunLink)metaRows.push(['Ürün Linki',r.urunLink,'ok']);
  var metaHtml=metaRows.map(function(row){return '<tr><td class="lbl">'+esc(row[0])+'</td><td class="val '+(row[2]||'')+'">'+esc(row[1]||'—')+'</td></tr>';}).join('');

  // Score rows
  var sRows=[['B1 · YZ Araç Kullanımı',sc.b1,'#F59E0B'],['B2 · Materyal & Doğrulama',sc.b2,'#1D4ED8'],['B3 · Pedagojik Tasarım',sc.b3,'#F59E0B'],['B4 · Kazanım & İçerik',sc.b4,'#166534'],['B5 · Prompt Kalitesi',sc.b5,'#5B21B6']];
  var scHtml=sRows.map(function(a){var pct=Math.round(a[1]/10*100);return '<tr><td>'+esc(a[0])+'</td><td class="sc" style="color:'+a[2]+'">'+a[1]+'/10</td><td>'+pct+'%</td></tr>';}).join('');
  scHtml+='<tr class="total"><td colspan="2">TOPLAM — '+esc(gr.label)+'</td><td>'+t+' / 50</td></tr>';

  // Grade bar
  var gradeHtml=GRADES.map(function(g){
    var act=g.label===gr.label;
    var bg=act?'#1D4ED8':'#'+g.bg;
    return '<div class="pdf-grade-cell" style="background:'+bg+'">'+
      '<div class="gn">'+esc(g.label)+'</div>'+
      '<div class="gr">'+g.min+'-'+g.max+'</div>'+
      (act?'<div class="ga">▲ '+t+'/50</div>':'<div class="ga">&nbsp;</div>')+
      '</div>';
  }).join('');

  // Dim cards
  var dimHtml=DIMW.map(function(d,i){
    var s=sc['b'+(i+1)]||0, dim=(r.dims&&r.dims['b'+(i+1)])||{};
    var good=Array.isArray(dim.good)?dim.good:[];
    var weak=Array.isArray(dim.weak)?dim.weak:[];
    return '<div class="pdf-dim">'+
      '<div class="pdf-dim-hdr" style="background:#'+d.hc+'">'+
        '<span class="dtitle">BOYUT '+(i+1)+'  '+esc(d.label)+'</span>'+
        '<span class="dscore">'+s+'/10</span>'+
      '</div>'+
      '<div class="pdf-dim-status">'+esc(dim.status||'—')+'</div>'+
      '<div class="pdf-dim-cols">'+
        '<div class="pdf-dim-good">'+
          '<h5>✓ GÜÇLÜ YÖNLER</h5>'+
          '<ul>'+(good.length?good.map(function(g){return '<li>'+esc(g)+'</li>';}).join(''):'<li>—</li>')+'</ul>'+
        '</div>'+
        '<div class="pdf-dim-weak">'+
          '<h5>▲ GELİŞİM ALANLARI</h5>'+
          '<ul>'+(weak.length?weak.map(function(w){return '<li>'+esc(w)+'</li>';}).join(''):'<li>—</li>')+'</ul>'+
        '</div>'+
      '</div>'+
      (dim.rec?'<div class="pdf-dim-rec"><strong>➜ ÖNERİ:</strong> '+esc(dim.rec)+'</div>':'')+
    '</div>';
  }).join('');

  // Steps
  var stepHtml=(r.steps||[]).map(function(s,i){
    return '<div class="pdf-step step'+i+'">'+
      '<span class="snum">0'+(i+1)+'</span>'+
      '<span class="stitle">'+esc(s.title||'—')+'</span>'+
      '<div class="sdesc">'+esc(s.desc||'—')+'</div>'+
    '</div>';
  }).join('');

  var html=
    // SAYFA 1
    '<div class="pdf-cover">'+
      '<div class="pdf-cover-title">GERİ DÖNÜT RAPORU</div>'+
      '<div class="pdf-cover-sub">Dijital Öğrenme Ürünü Hazırlama ve Yansıtma Formu Analizi</div>'+
      '<div class="pdf-cover-sub2">Sosyal Bilgiler Öğretiminde Bilişim Teknolojileri Dersi</div>'+
    '</div>'+
    '<div class="pdf-name-bar">'+
      '<span class="name">'+esc(r.studentName||'—')+'</span>'+
      '<span class="meta">  ·  H'+r.hafta+'  ·  '+esc(r.tema||'')+'  ·  '+esc(r.tarih||'')+'</span>'+
    '</div>'+
    '<div class="pdf-ders-bar">'+
      '<span>Ders Öğretim Üyesi: </span><strong>Doç. Dr. Erhan Yaylak</strong>'+
      '<span>  |  Bilişim Teknolojileri Dersi · Sosyal Bilgiler Öğretmenliği</span>'+
    '</div>'+

    '<table class="pdf-meta">'+metaHtml+'</table>'+

    '<div class="pdf-summary"><h4>GENEL DEĞERLENDİRME ÖZETİ</h4>'+esc(r.genelOzet||'—')+'</div>'+

    '<div class="pdf-section-title">PUAN ÖZETİ  &amp;  DERECE</div>'+
    '<table class="pdf-scores">'+
      '<tr><th>BOYUT</th><th>PUAN</th><th>%</th></tr>'+
      scHtml+
    '</table>'+
    '<div class="pdf-grade-bar">'+gradeHtml+'</div>'+

    // SAYFA 2
    '<div class="page-break"></div>'+
    '<div class="pdf-section-title">BOYUT KARTLARI</div>'+
    dimHtml+

    '<div class="pdf-section-title">ÖNCELİKLİ 3 GELİŞİM ADIMI</div>'+
    '<div class="pdf-steps">'+stepHtml+'</div>'+

    '<div class="pdf-footer">Hazırlayan: Doç. Dr. Erhan Yaylak  |  Form Analiz Aracı (Claude AI)  |  H'+r.hafta+'  |  Bilişim Teknolojileri Dersi · SB Öğretmenliği · 2025-2026</div>';

  G('pdfContent').innerHTML=html;
}

function printPDF(){
  if(!currentRep){setStatus('Önce değerlendirme yapın.','#fca5a5');return;}
  // Set document title for PDF filename
  var name=String(currentRep.studentName||'rapor').replace(/\s+/g,'_');
  var oldTitle=document.title;
  document.title='rapor_'+name+'_h'+currentRep.hafta;
  window.print();
  document.title=oldTitle;
}
</script>
</body>
</html>

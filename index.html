Değerlendirme kriterleri:
• Araç yetkinliği: M.1,4,5 farklı arayüzlere uyum + Form S.8,9 araç çeşitliliğiyle karşılaştırma
• Geri bildirim entegrasyonu: M.6,7,8 AI çıktısını anlamlandırma & güçlü/zayıf yön tespiti
• Öz-düzenleme & bağımlılık bilinci: M.9,10,11 hedef değerlendirme + Form S.19 sorumluluk farkındalığı; M.10 bağımlılık üzerine eleştirel düşünme kritik
• Eleştirel düşünme & problem çözme: M.13,14 farklı bakış açıları & problem çözme için AI
• Öğrenme kalıcılığı: M.15,16,17,18 katılım, kalıcılık, öğrenme tarzı uyumu

═══ BOYUT 3 — Dijital Materyal Geliştirme Süreci (10 puan) ═══
[Yansıtma Formu S.8-14, S.17-18]

Değerlendirme kriterleri:
• Araç seçimi kalitesi (S.8 dijital araç + S.9 YZ aracı): Amaca uygunluk, çeşitlilik, gerekçe
• AI kullanım aşamaları (S.10): Tek aşama (yüzeysel) → Çok aşamalı entegrasyon (derinlemesine); planlama+içerik+değerlendirme = ideal
• Doğrulama kalitesi (S.12): En az 2 kaynak şartı + kaynak türü çeşitliliği (ders kitabı, kurum sitesi, atlas vb.) + bölüm/sayfa/URL detayı
• Gizlilik kontrolü (S.13): Sadece "kontrol etmedim" seçimi → ciddi zayıflık; anonimleştirme+telif kontrolü = güçlü
• Önyargı/kapsayıcılık kontrolü (S.14): Kontrol etmeme → risk; düzeltme yaptığını belirtme → olgunluk işareti
• AI oranı & özgünlük dengesi (S.17): %0 veya %76-100 uç değerler sorgulanmalı; %26-75 arası + prompt paylaşımı = iyi denge

═══ BOYUT 5 — Sosyal Bilgiler Kazanım & İçerik Uyumu (10 puan) ═══

═══ BOYUT 6 — Prompt Mühendisliği ve YZ İş Birliği Kalitesi (Nitel) ═══

const formatMarkdown = (text) => {
  if (!text) return "";
  return text
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g, (m) => `<ul>${m}</ul>`)
    .replace(/\n\n/g, '</p><p>')
    .replace(/^(?!<[hul]|<\/[hul]|<p>)(.+)$/gm, '<p>$1</p>')
    .replace(/<p><\/p>/g, '');
};

const mdToHtmlForPDF = (text) => {
  if (!text) return "";
  const lines = text.split("\n");
  let html = "", inList = false;
  for (const line of lines) {
    const t = line.trim();
    if (!t) { if (inList) { html += "</ul>"; inList = false; } continue; }
    const esc = (s) => s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>").replace(/\*(.+?)\*/g, "<em>$1</em>");
    if (/^## (.+)$/.test(t)) { if (inList) { html += "</ul>"; inList = false; } html += `<h2>${esc(t.slice(3))}</h2>`; }
    else if (/^### (.+)$/.test(t)) { if (inList) { html += "</ul>"; inList = false; } html += `<h3>${esc(t.slice(4))}</h3>`; }
    else if (/^- (.+)$/.test(t)) { if (!inList) { html += "<ul>"; inList = true; } html += `<li>${esc(t.slice(2))}</li>`; }
    else { if (inList) { html += "</ul>"; inList = false; } html += `<p>${esc(t)}</p>`; }
  }
  if (inList) html += "</ul>";
  return html;
};

  const readFile = async (f) => {
    const ext = f.name.split(".").pop().toLowerCase();
    if (["xlsx","xls","csv"].includes(ext)) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = (e) => {
          try {
            const wb = window.XLSX.read(e.target.result, { type:"binary" });
            let t = `DOSYA: ${f.name}\n\n`;
            wb.SheetNames.forEach((s) => {
              const ws = wb.Sheets[s];
              const d = window.XLSX.utils.sheet_to_json(ws, { header:1 });
              t += `=== ${s} ===\n`;
              d.forEach((row) => { if (row.some((c) => c != null && c !== "")) t += row.join(" | ") + "\n"; });
              t += "\n";
            });
            res(t);
          } catch(e) { rej(e); }
        };
        r.onerror = rej; r.readAsBinaryString(f);
      });
    } else if (ext === "pdf") {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = (e) => res({ type:"pdf", base64: e.target.result.split(",")[1] });
        r.onerror = rej; r.readAsDataURL(f);
      });
    } else if (["txt","md"].includes(ext)) {
      return new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = (e) => res(e.target.result);
        r.onerror = rej; r.readAsText(f, "UTF-8");
      });
    } else throw new Error("Desteklenmeyen dosya türü.");

                  style={{ background:C.panel, border:`1.5px solid ${C.border}`, borderRadius:"14px", padding:"22px 18px", cursor:"pointer", transition:"all 0.25s" }}
                  onMouseOver={(e) => { const el = e.currentTarget; el.style.borderColor=m.color; el.style.background=`${m.color}10`; el.style.transform="translateY(-3px)"; el.style.boxShadow=`0 10px 28px ${m.color}28`; }}
                  onMouseOut={(e) => { const el = e.currentTarget; el.style.borderColor=C.border; el.style.background=C.panel; el.style.transform="translateY(0)"; el.style.boxShadow="none"; }}
                >
                  <div style={{ fontSize:"30px", marginBottom:"10px" }}>{m.icon}</div>
                  <div style={{ fontSize:"14px", fontWeight:"bold", color:"#dde9ff", marginBottom:"3px" }}>{m.label}</div>
                  <div style={{ fontSize:"10px", color:m.color, fontFamily:"system-ui", fontWeight:600, marginBottom:"9px" }}>{m.sub}</div>
                  <div style={{ fontSize:"11px", color:C.soft, fontFamily:"system-ui", lineHeight:1.6 }}>{m.desc}</div>
                </div>
              ))}
            </div>

            {/* 7 Boyut özet tablosu */}
            <div style={{ background:C.panel, border:`1px solid ${C.bright}`, borderRadius:"14px", padding:"20px 22px" }}>
              <div style={{ fontSize:"9px", textTransform:"uppercase", letterSpacing:"2px", color:C.sky, fontWeight:700, marginBottom:"14px", fontFamily:"system-ui" }}>7 Değerlendirme Boyutu — Ölçek 1, Ölçek 2 ve Yansıtma Formu Entegrasyonu</div>
              <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"8px" }}>
                {DIMS.map((d) => (
                  <div key={d.id} style={{ padding:"10px 13px", background:"#050c18", borderRadius:"8px", border:`1px solid ${C.border}`, display:"flex", gap:"9px", alignItems:"flex-start" }}>
                    <span style={{ fontSize:"17px", flexShrink:0, marginTop:"1px" }}>{d.icon}</span>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <div style={{ fontSize:"12px", color:"#cbd5e1", fontFamily:"system-ui", fontWeight:600 }}>{d.label}</div>
                        <div style={{ fontSize:"10px", color:d.color, fontFamily:"system-ui", fontWeight:700, flexShrink:0, marginLeft:"6px" }}>{d.pts ? `${d.pts}p` : "Nitel"}</div>
                      </div>
                      <div style={{ fontSize:"9.5px", color:d.color, fontFamily:"system-ui", opacity:0.85 }}>{d.source}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ══ DOSYA YÜKLEME ══ */}
        {(step === "upload" || step === "ready") && mode && (
          <div>
            <div style={{ background:C.panel, border:`1px solid ${mc}35`, borderRadius:"11px", padding:"13px 16px", marginBottom:"16px", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"9px" }}>
                <span style={{ fontSize:"20px" }}>{REPORT_MODES[mode].icon}</span>
                <div>
                  <div style={{ fontSize:"13px", fontWeight:"bold", color:"#dde9ff" }}>{REPORT_MODES[mode].label}</div>
                  <div style={{ fontSize:"11px", color:C.soft, fontFamily:"system-ui" }}>{REPORT_MODES[mode].desc}</div>
                </div>
              </div>
              <button onClick={reset} style={{ padding:"5px 11px", background:"transparent", border:`1px solid ${C.border}`, borderRadius:"7px", color:C.muted, cursor:"pointer", fontFamily:"system-ui", fontSize:"11px" }}>← Değiştir</button>
            </div>

            <div onDragOver={(e) => { e.preventDefault(); setDragOver(true); }} onDragLeave={() => setDragOver(false)} onDrop={handleDrop}
              onClick={() => !file && fileInputRef.current?.click()}
              style={{ border:`2px dashed ${dragOver?mc:file?"#22c55e":C.border}`, borderRadius:"13px", padding:"36px 22px", textAlign:"center", cursor:file?"default":"pointer", background:dragOver?`${mc}09`:file?"rgba(34,197,94,0.04)":C.panel, transition:"all 0.3s", marginBottom:"14px" }}
            >
              <input ref={fileInputRef} type="file" accept=".pdf,.xlsx,.xls,.csv,.txt" style={{ display:"none" }} onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
              {file ? (
                <div>
                  <div style={{ fontSize:"36px", marginBottom:"7px" }}>{file.name.endsWith(".pdf")?"📄":"📊"}</div>
                  <div style={{ fontSize:"14px", color:"#86efac", fontWeight:"bold", marginBottom:"3px" }}>{file.name}</div>
                  <div style={{ fontSize:"11px", color:"#4ade80", fontFamily:"system-ui" }}>✓ Yüklendi — {(file.size/1024).toFixed(1)} KB</div>
                  <button onClick={(e) => { e.stopPropagation(); backToUpload(); }} style={{ marginTop:"9px", padding:"3px 10px", background:"transparent", border:`1px solid ${C.border}`, borderRadius:"5px", color:C.soft, cursor:"pointer", fontFamily:"system-ui", fontSize:"11px" }}>Farklı dosya</button>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize:"44px", marginBottom:"10px" }}>📂</div>
                  <div style={{ fontSize:"15px", color:"#cbd5e1", marginBottom:"5px" }}>Form verilerini sürükleyin veya seçin</div>
                  <div style={{ fontSize:"11px", color:C.muted, fontFamily:"system-ui", marginBottom:"13px" }}>
                    {mode==="weekly"&&"Bir öğrenciye ait tek haftanın Yansıtma Formu + Ölçek verileri"}
                    {mode==="individual"&&"Bir öğrencinin 10 haftalık Yansıtma Formu + Ölçek verileri"}
                    {mode==="class"&&"Tüm öğrencilerin 10 haftalık Yansıtma Formu + Ölçek verileri"}
                  </div>
                  <div style={{ display:"flex", gap:"6px", justifyContent:"center", flexWrap:"wrap", fontFamily:"system-ui", fontSize:"10px" }}>
                    {["PDF","Excel (.xlsx)","CSV","Metin (.txt)"].map((f) => (
                      <span key={f} style={{ padding:"3px 10px", borderRadius:"20px", background:"#050c18", border:`1px solid ${C.border}`, color:C.sky }}>{f}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>

            {step === "ready" && (
              <>
                {/* 7 Boyut mini özeti */}
                <div style={{ background:C.panel, border:`1px solid ${C.bright}`, borderRadius:"9px", padding:"13px 16px", marginBottom:"13px", fontFamily:"system-ui" }}>
                  <div style={{ fontSize:"8.5px", color:C.sky, fontWeight:700, marginBottom:"9px", letterSpacing:"2px", textTransform:"uppercase" }}>Bu raporda değerlendirilecek 7 boyut</div>
                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"5px" }}>
                    {DIMS.map((d) => (
                      <div key={d.id} style={{ padding:"7px 10px", background:"#050c18", borderRadius:"6px", border:`1px solid ${C.border}`, display:"flex", gap:"6px", alignItems:"center", justifyContent:"space-between" }}>
                        <div style={{ display:"flex", gap:"6px", alignItems:"center", fontSize:"11px", color:"#cbd5e1" }}><span>{d.icon}</span>{d.label}</div>
                        <span style={{ color:d.color, fontWeight:700, fontSize:"9.5px", flexShrink:0 }}>{d.pts ? `${d.pts}p` : "Nitel"}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <button onClick={analyzeForm}
                  style={{ width:"100%", padding:"14px", background:`linear-gradient(135deg,${mc},${mc}cc)`, border:"none", borderRadius:"11px", color:"#fff", fontSize:"15px", fontWeight:"bold", cursor:"pointer", fontFamily:"Georgia,serif", boxShadow:`0 5px 24px ${mc}40`, transition:"transform 0.2s,box-shadow 0.2s" }}
                  onMouseOver={(e) => { e.currentTarget.style.transform="translateY(-2px)"; e.currentTarget.style.boxShadow=`0 9px 32px ${mc}60`; }}
                  onMouseOut={(e) => { e.currentTarget.style.transform="translateY(0)"; e.currentTarget.style.boxShadow=`0 5px 24px ${mc}40`; }}
                >
                  {REPORT_MODES[mode].icon} 7 Boyutlu Analiz Başlat — PDF Rapor Oluştur
                </button>
              </>
            )}
          </div>
        )}

        {/* ══ LOADING ══ */}
        {step === "analyzing" && (
          <div style={{ textAlign:"center", padding:"58px 28px", background:C.panel, border:`1px solid ${C.bright}`, borderRadius:"16px" }}>
            <style>{`@keyframes spin{to{transform:rotate(360deg)}} @keyframes dp{0%,100%{opacity:.2}50%{opacity:1}}`}</style>
            <div style={{ width:"52px", height:"52px", margin:"0 auto 18px", border:`4px solid ${C.border}`, borderTopColor:mc, borderRadius:"50%", animation:"spin 1s linear infinite" }} />
            <div style={{ fontSize:"17px", color:"#93c5fd", marginBottom:"5px", fontWeight:"bold" }}>7 Boyutlu Analiz Yapılıyor…</div>
            <div style={{ fontSize:"12px", color:C.muted, fontFamily:"system-ui", marginBottom:"3px" }}>{REPORT_MODES[mode].label}</div>
            <div style={{ fontSize:"11.5px", color:C.muted, fontFamily:"system-ui" }}>{loadingMsg}</div>
            <div style={{ marginTop:"15px", display:"flex", gap:"5px", justifyContent:"center" }}>
              {[0,1,2].map((i) => <div key={i} style={{ width:"7px", height:"7px", borderRadius:"50%", background:mc, animation:`dp ${1+i*0.25}s ease-in-out infinite` }} />)}
            </div>
          </div>
        )}

        {error && <div style={{ background:"rgba(220,38,38,0.1)", border:"1px solid #dc2626", borderRadius:"9px", padding:"12px 15px", marginTop:"11px", color:"#fca5a5", fontFamily:"system-ui", fontSize:"12.5px" }}>⚠️ {error}</div>}

        {/* ══ RAPOR ══ */}
        {step === "done" && report && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"12px", background:C.panel, border:`1px solid ${mc}30`, borderRadius:"11px", padding:"11px 15px" }}>
              <div style={{ display:"flex", alignItems:"center", gap:"9px" }}>
                <div style={{ width:"28px", height:"28px", background:`linear-gradient(135deg,${mc},${mc}bb)`, borderRadius:"7px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"14px" }}>{REPORT_MODES[mode].icon}</div>
                <div>
                  <div style={{ fontSize:"12px", fontWeight:"bold", color:C.sky }}>{REPORT_MODES[mode].label}</div>
                  <div style={{ fontSize:"9.5px", color:C.muted, fontFamily:"system-ui" }}>{file?.name}</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:"7px" }}>
                <button onClick={handlePDF} disabled={pdfGenerating}
                  style={{ padding:"7px 15px", background:pdfGenerating?"rgba(220,38,38,0.3)":"linear-gradient(135deg,#dc2626,#b91c1c)", border:"none", borderRadius:"7px", color:"#fff", cursor:pdfGenerating?"wait":"pointer", fontFamily:"system-ui", fontSize:"12px", fontWeight:700, display:"flex", alignItems:"center", gap:"5px", boxShadow:"0 3px 10px rgba(220,38,38,0.3)" }}
                  onMouseOver={(e) => !pdfGenerating && (e.currentTarget.style.opacity="0.85")}
                  onMouseOut={(e) => e.currentTarget.style.opacity="1"}
                >
                  {pdfGenerating ? "⏳ Hazırlanıyor…" : "⬇️ PDF İndir"}
                </button>
                <button onClick={backToUpload} style={{ padding:"7px 12px", background:"transparent", border:`1px solid ${C.border}`, borderRadius:"7px", color:C.soft, cursor:"pointer", fontFamily:"system-ui", fontSize:"12px" }}>🔄 Yeni Dosya</button>
                <button onClick={reset} style={{ padding:"7px 12px", background:"transparent", border:`1px solid ${C.border}`, borderRadius:"7px", color:C.muted, cursor:"pointer", fontFamily:"system-ui", fontSize:"12px" }}>⬅️ Mod Seç</button>
              </div>
            </div>
            <div style={{ background:"rgba(37,99,235,0.07)", border:"1px solid rgba(59,130,246,0.18)", borderRadius:"7px", padding:"7px 13px", marginBottom:"12px", fontFamily:"system-ui", fontSize:"11px", color:"#93c5fd", display:"flex", gap:"6px", alignItems:"flex-start" }}>
              <span>💡</span>
              <span>Tarayıcının yazdırma penceresinde <strong style={{ color:"#bfdbfe" }}>"PDF olarak kaydet"</strong> seçeneğiyle kapak sayfası dahil tüm raporu indirebilirsiniz.</span>
            </div>
            <div style={{ background:"rgba(4,9,20,0.96)", border:`1px solid ${C.bright}`, borderRadius:"14px", padding:"26px" }}>
              <style>{`.rc h2{font-size:14.5px;color:${C.sky};border-bottom:1px solid #192f4a;padding-bottom:6px;margin:22px 0 8px;font-family:Georgia,serif} .rc h2:first-child{margin-top:0} .rc h3{font-size:12.5px;color:#93c5fd;margin:12px 0 5px;font-family:Georgia,serif} .rc strong{color:#e2e8f0} .rc ul{margin:5px 0 8px 18px} .rc li{color:#c8d9eb;margin:4px 0;font-family:system-ui;font-size:11.5px;line-height:1.65} .rc p{color:#c4d4e8;margin:4px 0;font-family:system-ui;font-size:11.5px;line-height:1.65} .rc em{color:#7a8fa8}`}</style>
              <div className="rc" dangerouslySetInnerHTML={{ __html: formatMarkdown(report) }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

    const rootEl = document.getElementById('root');
    const root = ReactDOM.createRoot(rootEl);
    root.render(React.createElement(FormAnalizAraci));
  </script>
</body>
</html>

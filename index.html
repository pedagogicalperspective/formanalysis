<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SB Dönüt Raporu</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0a0f1e; color: #e2e8f0; padding: 24px; }
.wrap { max-width: 700px; margin: 0 auto; }
h1 { font-size: 22px; color: #93c5fd; margin-bottom: 4px; }
.sub { font-size: 11px; color: #334155; margin-bottom: 20px; }
.box { background: #111827; border: 1px solid #1e3a5f; border-radius: 10px; padding: 16px; margin-bottom: 12px; }
.box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: #475569; margin-bottom: 10px; }
label.lbl { display: block; font-size: 11px; color: #475569; text-transform: uppercase; letter-spacing: .3px; margin-bottom: 4px; }
input[type=password], input[type=text], select {
  display: block; width: 100%;
  background: #0d1524; border: 1px solid #1e3a5f; border-radius: 7px;
  padding: 9px 12px; color: #e2e8f0; font-size: 13px; font-family: Arial, sans-serif;
  outline: none; appearance: none; -webkit-appearance: none;
}
input[type=password] { font-family: monospace; }
input[type=password]:focus, input[type=text]:focus, select:focus { border-color: #1d4ed8; }
select option { background: #0d1524; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.fld { display: flex; flex-direction: column; gap: 4px; }
input[type=file] {
  display: block; width: 100%;
  background: #0d1524; border: 2px dashed #1e3a5f;
  border-radius: 8px; padding: 14px 12px;
  color: #64748b; font-size: 13px; font-family: Arial, sans-serif;
  cursor: pointer; outline: none;
}
input[type=file]:hover { border-color: #1d4ed8; color: #93c5fd; }
input[type=file]::file-selector-button {
  background: #1d4ed8; color: white; border: none;
  padding: 7px 16px; border-radius: 6px; cursor: pointer;
  font-size: 12px; font-weight: 700; margin-right: 12px; font-family: Arial, sans-serif;
}
#statusBox {
  padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.7;
  background: #0d1524; border: 1px solid #1e3a5f; min-height: 44px;
  margin-top: 10px; white-space: pre-wrap;
}
#progBar { height: 4px; background: #1e3a5f; border-radius: 2px; overflow: hidden; margin-top: 8px; }
#progFill { height: 100%; background: #1d4ed8; transition: width .4s ease; width: 0; }
#runBtn {
  display: block; width: 100%; padding: 16px;
  background: #1d4ed8; color: white; border: none;
  border-radius: 10px; font-size: 15px; font-weight: 700;
  cursor: pointer; font-family: Arial, sans-serif; margin-top: 4px;
}
#runBtn:hover:not(:disabled) { background: #1a44c0; }
#runBtn:disabled { opacity: .45; cursor: not-allowed; }
#resultBox {
  display: none; padding: 14px 16px; border-radius: 8px;
  background: #0d1f0d; border: 1px solid #166534; margin-top: 10px;
}
.r-name { font-size: 16px; font-weight: 700; color: #f1f5f9; }
.r-meta { font-size: 11px; color: #334155; margin-top: 3px; }
.r-score { font-size: 38px; font-weight: 700; color: #86efac; }
.dims { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-top: 10px; }
.dim { text-align: center; background: #111827; border-radius: 8px; padding: 10px 4px; }
.keySt { font-size: 11px; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrap">
<h1>SB Dönüt Raporu</h1>
<div class="sub">Doç. Dr. Erhan Yaylak · Bilişim Teknolojileri · Sosyal Bilgiler Öğretmenliği</div>

<div class="box">
  <h3>Anthropic API Anahtarı</h3>
  <input type="password" id="apiKey" placeholder="sk-ant-api03-..." autocomplete="off">
  <div class="keySt" id="keySt"></div>
</div>

<div class="box">
  <h3>Hafta &amp; Tema</h3>
  <div class="row2">
    <div class="fld"><label class="lbl">Hafta</label>
      <select id="weekSel">
        <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option>
        <option>6</option><option>7</option><option>8</option><option>9</option><option>10</option>
      </select>
    </div>
    <div class="fld"><label class="lbl">Tema</label>
      <input type="text" id="temaInp" placeholder="1. Tema">
    </div>
  </div>
</div>

<div class="box">
  <h3>Öğrenci Form PDF'i</h3>
  <input type="file" id="fileInp" accept=".pdf,application/pdf">
  <div id="statusBox">Dosya seçilmedi.</div>
  <div id="progBar"><div id="progFill"></div></div>
</div>

<button id="runBtn">Değerlendir &amp; Word İndir</button>

<div id="resultBox">
  <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap">
    <div><div class="r-name" id="rName"></div><div class="r-meta" id="rMeta"></div></div>
    <div style="text-align:right"><div class="r-score" id="rScore"></div><div id="rGrade" style="font-size:12px;font-weight:700;margin-top:2px"></div></div>
  </div>
  <div class="dims" id="rDims"></div>
</div>

<script>
var pdfB64 = null;

var GRADES = [{label:'BAŞLANGIÇ',min:0,max:15,fill:'#475569'},{label:'TEMEL',min:16,max:25,fill:'#1D4ED8'},{label:'GELİŞMEKTE',min:26,max:35,fill:'#1E4D8C'},{label:'İYİ',min:36,max:43,fill:'#166534'},{label:'PEKİYİ',min:44,max:50,fill:'#14532D'}];
var DIMS = [{id:'b1',label:'YZ Araç',color:'#F59E0B'},{id:'b2',label:'Materyal',color:'#1D4ED8'},{id:'b3',label:'Pedagoji',color:'#F59E0B'},{id:'b4',label:'Kazanım',color:'#166534'},{id:'b5',label:'Prompt',color:'#5B21B6'}];
function getGrade(t){return GRADES.find(function(g){return t>=g.min&&t<=g.max;})||GRADES[0];}
function totSc(sc){return Object.values(sc||{}).reduce(function(a,b){return a+b;},0);}
function G(id){return document.getElementById(id);}

function setStatus(msg,color){
  var el=G('statusBox');
  el.textContent=msg;
  el.style.color=color||'#93c5fd';
  el.style.borderColor=color==='#86efac'?'#166534':color==='#fca5a5'?'#991b1b':'#1e3a5f';
}
function setP(pct,msg){G('progFill').style.width=pct+'%';if(msg)setStatus(msg,'#93c5fd');}

// API key
function loadKey(){
  var k=localStorage.getItem('sb_key')||'';
  if(k.startsWith('sk-')){G('apiKey').value=k;G('keySt').textContent='✓ Kayıtlı key yüklendi';G('keySt').style.color='#86efac';}
}
function getKey(){
  var v=G('apiKey').value.trim();
  if(v.startsWith('sk-')){localStorage.setItem('sb_key',v);G('keySt').textContent='✓ Kaydedildi';G('keySt').style.color='#86efac';}
  return v||localStorage.getItem('sb_key')||'';
}

// File input — attach via JS to be safe
window.addEventListener('DOMContentLoaded',function(){
  loadKey();
  G('fileInp').addEventListener('change',function(){
    var file=this.files&&this.files[0];
    if(!file){setStatus('Dosya seçilmedi.');return;}
    setStatus('Yükleniyor: '+file.name+' ...');setP(0);
    var reader=new FileReader();
    reader.addEventListener('load',function(e){
      var res=e.target.result||'';
      var idx=res.indexOf(',');
      if(idx<0){setStatus('Dosya okunamadı.','#fca5a5');G('fileInp').value='';return;}
      var b64=res.substring(idx+1);
      if(!b64||b64.length<100){setStatus('İçerik boş ('+b64.length+' karakter).','#fca5a5');G('fileInp').value='';return;}
      pdfB64=b64;
      setStatus('Hazır: '+file.name+' ('+(file.size/1024).toFixed(1)+' KB)\nValüerlendir butonuna basın.','#86efac');
      G('fileInp').value='';
    });
    reader.addEventListener('error',function(){
      setStatus('Okuma hatası.','#fca5a5');G('fileInp').value='';
    });
    reader.readAsDataURL(file);
  });

  G('runBtn').addEventListener('click',function(){
    runEval();
  });
});

async function runEval(){
  if(!pdfB64){setStatus('PDF seçilmedi!','#fca5a5');return;}
  var key=getKey();
  if(!key){setStatus('API Key yok! Üstteki alana sk-ant-api03-... girin.','#fca5a5');return;}

  G('runBtn').disabled=true;
  G('resultBox').style.display='none';
  var week=G('weekSel').value;
  var tema=G('temaInp').value||week+'. Tema';

  var prompt='Bu PDF '+week+'. hafta ogretmen adayi degerlendirme formudur.\n'+
    'B1=YZ kullanim(0-10) B2=Dogrulama(0-10) B3=Pedagoji(0-10) B4=Kazanim(0-10) B5=Prompt(0-10)\n'+
    'SADECE JSON dokundur:\n'+
    '{"studentName":"AD SOYAD","sinif":"X. Sinif","ders":"Sosyal Bilgiler","tema":"'+tema+'"'+
    ',"tarih":"tarih","unite":"unite","konu":"konu","kazanim":"SB.X.X.X - ifade"'+
    ',"dijitalArac":"arac","yzArac":"YZ","icerikTuru":"tur","yzKatki":"%26-50","urunLink":""'+
    ',"scores":{"b1":6,"b2":7,"b3":5,"b4":8,"b5":3}'+
    ',"genelOzet":"3-4 cumle"'+
    ',"dims":{"b1":{"status":"aciklama","good":["g1","g2","g3"],"weak":["w1","w2"],"rec":"oneri"}'+
    ',"b2":{"status":"","good":[],"weak":[],"rec":""},"b3":{"status":"","good":[],"weak":[],"rec":""}'+
    ',"b4":{"status":"","good":[],"weak":[],"rec":""},"b5":{"status":"","good":[],"weak":[],"rec":""}}'+
    ',"steps":[{"title":"adim 1","desc":"aciklama"},{"title":"adim 2","desc":"..."},{"title":"adim 3","desc":"..."}]}';

  try{
    setP(20,'Claude analiz ediyor...');
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'Content-Type':'application/json',
        'x-api-key':key,
        'anthropic-version':'2023-06-01',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        messages:[{role:'user',content:[
          {type:'document',source:{type:'base64',media_type:'application/pdf',data:pdfB64}},
          {type:'text',text:prompt}
        ]}]
      })
    });

    setP(65,'Yanit alindi...');
    if(!resp.ok){var et=await resp.text();throw new Error('HTTP '+resp.status+': '+et.substring(0,300));}
    var data=await resp.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    if(!data.content||!data.content[0])throw new Error('Bos yanit: '+JSON.stringify(data).substring(0,200));

    var raw=data.content[0].text||'';
    var clean=raw.replace(/```json/g,'').replace(/```/g,'').trim();
    var rep;
    try{rep=JSON.parse(clean);}
    catch(pe){
      var m=clean.match(/\{[\s\S]*\}/);
      if(m)rep=JSON.parse(m[0]);
      else throw new Error('JSON parse hatasi: '+pe.message+' // Raw: '+clean.substring(0,200));
    }
    rep.hafta=parseInt(week);rep.tema=tema;

    try{var db=JSON.parse(localStorage.getItem('sb_eval')||'{}');if(!db[rep.studentName])db[rep.studentName]={};db[rep.studentName][week]=rep;localStorage.setItem('sb_eval',JSON.stringify(db));}catch(se){console.warn('Save err:',se);}

    setP(80,'Word olusturuluyor...');
    await buildWord(rep);
    setP(100,'');

    var t=totSc(rep.scores),gr=getGrade(t);
    G('rName').textContent=rep.studentName||'?';
    G('rMeta').textContent=(rep.ders||'SB')+' · '+(rep.sinif||'')+' · H'+week+' · '+tema;
    G('rScore').textContent=t;
    G('rGrade').textContent=gr.label+' ('+t+'/50)';
    G('rGrade').style.color=gr.fill;
    G('rDims').innerHTML=DIMS.map(function(d){return '<div class="dim" style="border-top:3px solid '+d.color+'"><div style="font-size:8px;color:#475569;margin-bottom:5px">'+d.label+'</div><div style="font-size:20px;font-weight:700;color:'+d.color+'">'+(rep.scores[d.id]||0)+'</div><div style="font-size:9px;color:#334155">/10</div></div>';}).join('');
    G('resultBox').style.display='block';
    setStatus('Tamamlandi! '+rep.studentName+' · '+t+'/50 · '+gr.label+'\nWord dosyasi indirildi.','#86efac');
  }catch(err){
    setStatus('HATA:\n'+err.message,'#fca5a5');
    setP(0);
  }finally{
    G('runBtn').disabled=false;
  }
}

  var DIMW=[{label:'YZ Araç Kullanımı',color:'F59E0B',tc:'92400E',bg:'FEF3C7'},{label:'Materyal & Doğrulama',color:'1D4ED8',tc:'1D4ED8',bg:'DBEAFE'},{label:'Pedagojik Tasarım',color:'F59E0B',tc:'92400E',bg:'FEF3C7'},{label:'Kazanım & İçerik',color:'166534',tc:'166534',bg:'DCFCE7'},{label:'Prompt Kalitesi',color:'5B21B6',tc:'5B21B6',bg:'EDE9FE'}];
  var dimCards=DIMW.map(function(d,i){var s=sc['b'+(i+1)]||0,hc=DHC[i],dim=(r.dims&&r.dims['b'+(i+1)])||{},good=Array.isArray(dim.good)?dim.good:[],weak=Array.isArray(dim.weak)?dim.weak:[];return new D.Table({width:{size:9880,type:D.WidthType.DXA},columnWidths:[4940,4940],borders:{top:Bn(hc,8),bottom:Bn(hc,4),left:Bn(hc,8),right:Bn(hc,4),insideH:Bn('E2E8F0',2),insideV:Bn('E2E8F0',2)},rows:[new D.TableRow({children:[new D.TableCell({columnSpan:2,shading:{fill:hc,type:D.ShadingType.CLEAR},margins:{top:80,bottom:80,left:160,right:160},borders:{top:Nb(),bottom:Nb(),left:Bn(N,12),right:Nb()},children:[new D.Paragraph({children:[new D.TextRun({text:'BOYUT '+(i+1)+'  ',font:'Arial',size:20,bold:true,color:'DBEAFE'}),new D.TextRun({text:d.label,font:'Arial',size:20,bold:true,color:WH}),new D.TextRun({text:'     '+s+'/10',font:'Arial',size:24,bold:true,color:'FCD34D'})]})]})]}),new D.TableRow({children:[new D.TableCell({columnSpan:2,shading:{fill:LT,type:D.ShadingType.CLEAR},margins:{top:60,bottom:60,left:160,right:160},borders:{top:Nb(),bottom:Bn('E2E8F0'),left:Nb(),right:Nb()},children:[p(String(dim.status||'—'),{size:15,bold:true,before:0,after:0})]})]}),new D.TableRow({children:[new D.TableCell({width:{size:4940,type:D.WidthType.DXA},shading:{fill:GNBG,type:D.ShadingType.CLEAR},margins:{top:80,bottom:80,left:140,right:140},borders:{top:Nb(),bottom:Nb(),left:Nb(),right:Bn('E2E8F0',6)},verticalAlign:D.VerticalAlign.TOP,children:[p([new D.TextRun({text:'✓  GÜÇLÜ YÖNLER',font:'Arial',size:16,bold:true,color:GN})],{after:50,before:0})].concat(good.length?good.map(bl):[bl('—')])}),new D.TableCell({width:{size:4940,type:D.WidthType.DXA},shading:{fill:AMBG,type:D.ShadingType.CLEAR},margins:{top:80,bottom:80,left:140,right:140},borders:{top:Nb(),bottom:Nb(),left:Nb(),right:Nb()},verticalAlign:D.VerticalAlign.TOP,children:[p([new D.TextRun({text:'▲  GELİŞİM ALANLARI',font:'Arial',size:16,bold:true,color:AM})],{after:50,before:0})].concat(weak.length?weak.map(bl):[bl('—')])})]}),ne

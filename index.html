<style>

function set(p){Object.assign(S,p);render();}

// ── HELPERS ──
function h(tag,attrs,children){
  var e=document.createElement(tag);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      var v=attrs[k];
      if(k==='cls')e.className=v;
      else if(k==='html')e.innerHTML=v;
      else if(k==='style')Object.assign(e.style,v);
      else if(k.charAt(0)==='$')e.addEventListener(k.slice(1),v);
      else e.setAttribute(k,v);
    });
  }
  if(children){
    (Array.isArray(children)?children:[children]).forEach(function(c){
      if(c==null)return;
      if(typeof c==='string')e.appendChild(document.createTextNode(c));
      else if(c instanceof Node)e.appendChild(c);
    });
  }
  return e;
}
function d(a,c){return h('div',a,c);}
function mc(){return S.mode?{weekly:'#2563eb',individual:'#7c3aed',klass:'#0891b2'}[S.mode]:'#2563eb';}

  +'<div><div class="ph"><span>'+m.label.toUpperCase()+' · '+fname+'</span><span>'+dt+'</span></div>'
  +'<div class="ct2">'+body+'</div>'
  +'<div class="pf"><span>SB Öğretmen Adayı Değerlendirme Projesi - '+m.label+'</span><span>Claude AI · Form Analiz Aracı</span></div>'
  +'</div>'+ps+'</body></html>');
  var blob=new Blob([htmlStr],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.target='_blank';
  a.click();
  setTimeout(function(){URL.revokeObjectURL(url);},10000);
}

// ── MARKDOWN ──
function mdHtml(t){
  if(!t)return'';
  var lines=t.split('\n'),html='',inL=false;
  function esc(s){return s.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');}
  lines.forEach(function(line){
    var l=line.trim();
    if(!l){if(inL){html+='</ul>';inL=false;}return;}
    if(/^## (.+)$/.test(l)){if(inL){html+='</ul>';inL=false;}html+='<h2>'+esc(l.slice(3))+'</h2>';}
    else if(/^### (.+)$/.test(l)){if(inL){html+='</ul>';inL=false;}html+='<h3>'+esc(l.slice(4))+'</h3>';}
    else if(/^- (.+)$/.test(l)){if(!inL){html+='<ul>';inL=true;}html+='<li>'+esc(l.slice(2))+'</li>';}
    else{if(inL){html+='</ul>';inL=false;}html+='<p>'+esc(l)+'</p>';}
  });
  if(inL)html+='</ul>';
  return html;
}

// ── FILE READ ──
function readFile(file,cb){
  var ext=file.name.split('.').pop().toLowerCase();
  if(['xlsx','xls','csv'].indexOf(ext)>=0){
    if(typeof XLSX==='undefined'){cb('XLSX kütüphanesi yüklenemedi. Lütfen sayfayı yenileyin.',null);return;}
    var r=new FileReader();
    r.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'binary'});
        var t='DOSYA: '+file.name+'\n\n';
        wb.SheetNames.forEach(function(s){
          var ws=wb.Sheets[s];
          var data=XLSX.utils.sheet_to_json(ws,{header:1});
          t+='=== '+s+' ===\n';
          data.forEach(function(row){if(row.some(function(c){return c!=null&&c!=='';})){ t+=row.join(' | ')+'\n';}});
          t+='\n';
        });
        cb(null,t);
      }catch(e){cb(e.message,null);}
    };
    r.onerror=function(){cb('Dosya okunamadı',null);};
    r.readAsBinaryString(file);
  } else if(ext==='pdf'){
    var r2=new FileReader();
    r2.onload=function(e){cb(null,{type:'pdf',b64:e.target.result.split(',')[1]});};
    r2.onerror=function(){cb('PDF okunamadı',null);};
    r2.readAsDataURL(file);
  } else if(ext==='txt'||ext==='md'){
    var r3=new FileReader();
    r3.onload=function(e){cb(null,e.target.result);};
    r3.onerror=function(){cb('Dosya okunamadı',null);};
    r3.readAsText(file,'UTF-8');
  } else {
    cb('Desteklenmeyen dosya türü. PDF, Excel veya CSV yükleyin.',null);
  }
}

// ── API ──
function runAnalysis(){
  var key=localStorage.getItem('ak')||'';
  if(!key){set({err:'Lütfen önce API anahtarınızı girin (üstteki sarı bant).',step:'ready'});return;}
  if(!S.fc||!S.mode)return;
  var msgs=['Form verileri işleniyor...','Ölçek 1 analiz ediliyor...','Ölçek 2 değerlendiriliyor...','Materyal süreci inceleniyor...','Pedagojik tasarım analiz ediliyor...','Kazanım uyumu kontrol ediliyor...','Prompt kalitesi değerlendiriliyor...','Rapor yapılandırılıyor...'];
  var i=0;
  set({step:'analyzing',err:null,report:null,msg:msgs[0]});
  var iv=setInterval(function(){
    i=(i+1)%msgs.length;
    var el=document.getElementById('lmsg');
    if(el)el.textContent=msgs[i];
  },2500);
  var labels={weekly:'tek haftaya ait yansıtma formu ve ölçek verileri',individual:'10 haftalık tüm yansıtma formu ve ölçek verileri',klass:'tüm öğretmen adaylarının 10 haftalık verileri'};
  var prompt='Bu dosya, sosyal bilgiler öğretmen adaylarının '+labels[S.mode]+' içermektedir. Sistem talimatlarındaki 7 boyutlu değerlendirme çerçevesine göre kapsamlı bir rapor hazırla.';
  var messages;
  if(S.fc&&typeof S.fc==='object'&&S.fc.type==='pdf'){
    messages=[{role:'user',content:[{type:'document',source:{type:'base64',media_type:'application/pdf',data:S.fc.b64}},{type:'text',text:prompt}]}];
  } else {
    messages=[{role:'user',content:prompt+'\n\n---\n'+S.fc+'\n---'}];
  }
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'x-api-key':key,
      'anthropic-version':'2023-06-01',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:PROMPTS[S.mode],messages:messages})
  }).then(function(r){return r.json();}).then(function(data){
    clearInterval(iv);
    if(data.error)throw new Error(data.error.message);
    var text=(data.content||[]).map(function(b){return b.text||'';}).join('\n');
    set({report:text,step:'done'});
  }).catch(function(e){
    clearInterval(iv);
    set({err:'Analiz hatası: '+e.message,step:'ready'});
  });
}

// ── STEPBAR ──
function stepBar(){
  var order=['mode','upload','ready','analyzing','done'];
  var cur=order.indexOf(S.step==='ready'?'upload':S.step);
  var ids=[{id:'mode',l:'Tür Seç'},{id:'upload',l:'Dosya'},{id:'analyzing',l:'Analiz'},{id:'done',l:'Rapor'}];
  var bar=d({cls:'sbar'});
  ids.forEach(function(s,idx){
    var me=order.indexOf(s.id);
    var act=(s.id==='upload'&&(S.step==='upload'||S.step==='ready'))||S.step===s.id;
    var dn=me<cur;
    var item=d({cls:'si'+(act?' a':'')+(dn?' d':'')});
    item.appendChild(d({cls:'sn'},dn?'✓':String(idx+1)));
    item.appendChild(h('span',{cls:'sl'},s.l));
    bar.appendChild(item);
    if(idx<ids.length-1)bar.appendChild(d({cls:'sc'+(dn?' d':'')}));
  });
  return bar;
}

function pickFile(file){
  set({file:file,err:null,report:null,step:'upload'});
  readFile(file,function(err,content){
    if(err)set({err:'Dosya okunamadı: '+err});
    else set({fc:content,step:'ready'});
  });
}
